<script>
let currentRoomId = 'main';
let models = [];

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  return res.json();
}

async function init() {
  await loadRooms();
  models = await fetchJson('/api/models');
  loadAgents();
}

async function loadRooms() {
  const rooms = await fetchJson('/api/rooms');
  const list = document.getElementById('roomList');
  list.innerHTML = rooms.map(r => `
    <div class="room-item ${r.id === currentRoomId ? 'active' : ''}" 
         style="cursor:pointer; padding:10px; border-bottom:1px solid #222"
         onclick="selectRoom('${r.id}')">
      # ${r.name}
    </div>
  `).join('') + `<button class="btn" style="width:100%; margin-top:10px" onclick="createRoom()">+ New Room</button>`;
}

async function selectRoom(id) {
  currentRoomId = id;
  document.getElementById('messages').innerHTML = ''; // Clear for new room
  await loadRooms();
  await loadAgents();
}

async function createRoom() {
  const name = prompt("Enter room name:");
  if (!name) return;
  await fetchJson('/api/rooms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  loadRooms();
}

async function loadAgents() {
  const agents = await fetchJson(`/api/agents?roomId=${currentRoomId}`);
  document.getElementById('agentList').innerHTML = agents.map(a => `
    <div style="margin-top:10px; padding:10px; border:1px solid #3d8ef8; border-radius:8px">
      <strong>${a.name}</strong><br><small>${a.model}</small>
    </div>
  `).join('');
}

// ... (keep your existing showAgentModal, saveAgent, and sendMessage functions)
</script>
