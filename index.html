<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>Agent Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    /* ... (Keep the CSS from the previous full index.html I gave you) ... */
    #loginGate { position: fixed; inset: 0; background: #090b10; z-index: 2000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #0f1219; padding: 40px; border-radius: 12px; border: 1px solid #1e2535; text-align: center; }
  </style>
</head>
<body>

<div id="loginGate">
  <div class="login-box">
    <h1 style="font-family: 'Syne'; margin-bottom: 20px;">Enter Hub</h1>
    <input id="userNameInput" type="text" placeholder="Your Name..." style="padding: 10px; border-radius: 6px; border: 1px solid #1e2535; background: #141820; color: white; width: 100%; margin-bottom: 20px;">
    <button class="btn" onclick="login()">Join Room</button>
  </div>
</div>

<script>
let currentUser = '';
let currentRoomId = 'main';
let lastMessageCount = 0;

function login() {
  const name = document.getElementById('userNameInput').value.trim();
  if (!name) return alert("Enter a name");
  currentUser = name;
  document.getElementById('loginGate').style.display = 'none';
  init();
}

async function loadMessages() {
  const msgs = await fetchJson(`/api/messages?roomId=${currentRoomId}`);
  
  // Only re-render if there are new messages
  if (msgs.length !== lastMessageCount) {
    const container = document.getElementById('messages');
    container.innerHTML = msgs.map(m => `
      <div class="msg ${m.role}">
        <div class="msg-sender">${m.sender}</div>
        <div class="msg-content">${m.content}</div>
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
    lastMessageCount = msgs.length;
  }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;

  const agents = await fetchJson(`/api/agents?roomId=${currentRoomId}`);
  if (!agents.length) return alert("Add an agent first!");

  input.value = '';
  await fetchJson('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      content, 
      userName: currentUser, 
      roomId: currentRoomId, 
      agentId: agents[0].id 
    })
  });
  loadMessages(); // Refresh immediately after sending
}

// SYNC LOOP: Check for new stuff every 2 seconds
setInterval(() => {
  if (currentUser) {
    loadMessages();
    loadRooms();
  }
}, 2000);

// ... (keep the loadRooms, loadAgents, and showAgentModal functions)
</script>
</body>
</html>
