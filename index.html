<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07090f;
      --surface: #0d1117;
      --panel: #111620;
      --card: #161c28;
      --border: #1e2840;
      --border-soft: #1a2235;
      --text: #c9d4e8;
      --muted: #546080;
      --accent: #4f8ef7;
      --accent-dim: #1e3560;
      --accent-glow: rgba(79,142,247,0.15);
      --green: #3dd68c;
      --green-dim: #0f2e1e;
      --red: #f75f5f;
      --yellow: #f5c842;
      --yellow-dim: #2a2010;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── LOGIN GATE ── */
    #loginGate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 340px;
      text-align: center;
    }
    .gate-logo {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .gate-title {
      font-family: var(--sans);
      font-size: 26px;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
    }
    .gate-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .gate-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      padding: 12px 16px;
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .gate-input:focus { border-color: var(--accent); }

    /* ── SIDEBAR ── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo-text {
      font-weight: 700;
      font-size: 15px;
      color: white;
    }

    .online-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .user-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--green);
      margin-bottom: 4px;
    }
    .user-pill::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .rooms-section { flex: 1; overflow-y: auto; padding: 12px 8px; }
    .room-group-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 4px 8px 6px;
    }
    .room-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: all 0.15s;
      margin-bottom: 1px;
    }
    .room-item:hover { background: var(--card); color: var(--text); }
    .room-item.active { background: var(--accent-dim); color: var(--accent); }
    .room-hash { font-family: var(--mono); font-size: 12px; opacity: 0.5; }

    /* Topics under active room */
    .topic-list { margin: 2px 0 6px 18px; }
    .topic-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .topic-item:hover { color: var(--text); background: var(--card); }
    .topic-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
    .topic-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border-soft); }

    /* ── MAIN AREA ── */
    #main { display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-title {
      font-weight: 600;
      font-size: 15px;
      color: white;
    }
    .chat-topic-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(79,142,247,0.2);
    }
    .header-actions { display: flex; align-items: center; gap: 8px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 12px; animation: slideUp 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--accent-dim); color: var(--accent); }
    .msg.assistant .msg-avatar { background: var(--green-dim); color: var(--green); }
    .msg.system .msg-avatar { background: var(--yellow-dim); color: var(--yellow); display: none; }

    .msg-body { max-width: 75%; }
    .msg.user .msg-body { align-items: flex-end; }

    .msg-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px;
    }
    .msg.user .msg-meta { flex-direction: row-reverse; }
    .msg-sender { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .msg-time { font-family: var(--mono); font-size: 10px; color: var(--muted); opacity: 0.5; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-top-left-radius: 4px;
    }

    /* Tool activity chips */
    .tool-activity {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tool-chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .tool-chip.ok { border-color: var(--green-dim); color: var(--green); background: var(--green-dim); }
    .tool-chip.error { border-color: #3a1515; color: var(--red); background: #1a0a0a; }

    /* System suggestion banner */
    .suggest-banner {
      margin: 0 20px;
      padding: 10px 16px;
      background: var(--yellow-dim);
      border: 1px solid rgba(245,200,66,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px;
      animation: slideUp 0.2s ease;
      flex-shrink: 0;
    }
    .suggest-text { color: var(--yellow); }
    .suggest-actions { display: flex; gap: 8px; }

    /* Input */
    #inputArea {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    #msgInput {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      padding: 11px 14px;
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
      max-height: 120px;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }
    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--mono);
    }

    /* ── RIGHT PANEL ── */
    #agentPanel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-weight: 600; font-size: 14px; color: white; }

    .panel-scroll { flex: 1; overflow-y: auto; padding: 12px; }
    .panel-scroll::-webkit-scrollbar { width: 4px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .agent-card {
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .agent-card:hover { border-color: var(--border); }
    .agent-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .agent-name { font-weight: 600; font-size: 13px; color: white; }
    .agent-model {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .agent-tools-tag {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--green);
      margin-top: 4px;
    }
    .agent-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .agent-delete:hover { color: var(--red); }

    .panel-footer { padding: 12px; border-top: 1px solid var(--border-soft); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 420px;
      max-width: 90vw;
    }
    .modal-title { font-weight: 700; font-size: 16px; color: white; margin-bottom: 18px; }
    .modal label { display: block; font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      padding: 10px 12px;
      font-family: var(--sans);
      font-size: 13px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .tools-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
      font-size: 13px; color: var(--text);
    }
    .toggle {
      width: 36px; height: 20px;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(16px); }

    /* ── BUTTONS ── */
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 13px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn-ghost {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--panel); }
    .btn-sm { padding: 6px 11px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; font-size: 16px; }
    .btn-full { width: 100%; display: block; text-align: center; }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: flex; gap: 12px; align-items: flex-start;
      animation: slideUp 0.2s ease;
    }
    .typing-dots {
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      border-top-left-radius: 4px;
      display: flex; gap: 4px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.4s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); text-align: center; gap: 8px;
    }
    .empty-icon { font-size: 36px; opacity: 0.4; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); opacity: 0.4; }
    .empty-sub { font-size: 12px; opacity: 0.4; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* Markdown in messages */
    .msg-bubble code {
      font-family: var(--mono);
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble strong { color: white; }
    .msg-bubble em { opacity: 0.8; }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
    .msg-bubble li { margin-bottom: 3px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginGate">
  <div class="gate-card">
    <div class="gate-logo">⬡ Agent Hub</div>
    <div class="gate-title">Welcome back</div>
    <div class="gate-sub">Enter your name to join the hub</div>
    <input id="uName" class="gate-input" type="text" placeholder="Your name..." autofocus />
    <button class="btn btn-full" onclick="login()">Join Hub</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark">⬡</div>
    <div class="logo-text">Agent Hub</div>
  </div>
  <div class="online-section">
    <div class="section-label">Online</div>
    <div id="userList"></div>
  </div>
  <div class="rooms-section">
    <div class="room-group-label">Rooms</div>
    <div id="roomList"></div>
  </div>
  <div class="sidebar-footer">
    <button class="btn btn-ghost btn-sm btn-full" onclick="createRoom()">+ New Room</button>
  </div>
</div>

<!-- MAIN CHAT -->
<div id="main">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="chat-title" id="roomLabel"># main</div>
      <div class="chat-topic-badge" id="topicBadge">General</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="newTopic()">+ Topic</button>
    </div>
  </div>

  <div id="suggestArea"></div>

  <div id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-title">No messages yet</div>
      <div class="empty-sub">Start the conversation or add an agent</div>
    </div>
  </div>

  <div id="inputArea">
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="Message..."></textarea>
      <button class="btn btn-icon" onclick="sendMessage()" title="Send">↑</button>
    </div>
    <div class="input-hint" id="inputHint">↵ send &nbsp;·&nbsp; shift+↵ newline</div>
  </div>
</div>

<!-- AGENT PANEL -->
<div id="agentPanel">
  <div class="panel-header">
    <div class="panel-title">Agents</div>
    <button class="btn btn-sm" onclick="showAgentModal()">+ Add</button>
  </div>
  <div class="panel-scroll" id="agentList">
    <div style="color:var(--muted);font-size:12px;padding:8px;text-align:center">No agents yet</div>
  </div>
  <div class="panel-footer">
    <button class="btn btn-ghost btn-sm btn-full" onclick="refreshModels()" title="Rescan Ollama for new models">↺ Refresh Models</button>
  </div>
</div>

<script>
let currentUser = '';
let currentRoomId = 'main';
let currentRoomName = 'main';
let currentTopicId = null;
let currentTopicName = 'General';
let lastMsgCount = 0;
let models = [];
let toolsEnabled = true;
let agentSuggest = null;

const $ = id => document.getElementById(id);

async function fetchJson(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}

function login() {
  currentUser = $('uName').value.trim();
  if (!currentUser) return;
  $('loginGate').remove();
  init();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginGate')) {
    login();
  }
});

async function init() {
  models = await fetchJson('/api/models');
  await loadRooms();
  // Load default room's active topic
  const rooms = await fetchJson('/api/rooms');
  const main = rooms.find(r => r.id === 'main');
  if (main?.active_topic_id) {
    currentTopicId = main.active_topic_id;
  }
  await loadTopics();
  await loadMessages();
  await loadAgents();
  setInterval(sync, 2500);
}

async function sync() {
  await loadMessages();
  await loadAgents();
  await loadTopics();
  const users = await fetchJson('/api/presence', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userName: currentUser })
  });
  $('userList').innerHTML = users.map(u =>
    `<div class="user-pill">${u}</div>`
  ).join('');
}

async function refreshModels() {
  models = await fetchJson('/api/models');
  showToast('Models refreshed — ' + models.length + ' found');
}

// ── ROOMS ─────────────────────────────────────────────────────────────────────
async function loadRooms() {
  const rooms = await fetchJson('/api/rooms');
  $('roomList').innerHTML = rooms.map(r => `
    <div class="room-item ${r.id === currentRoomId ? 'active' : ''}" onclick="selectRoom('${r.id}','${escHtml(r.name)}')">
      <span class="room-hash">#</span> ${escHtml(r.name)}
    </div>
    ${r.id === currentRoomId ? `<div class="topic-list" id="topicList"></div>` : ''}
  `).join('');
  if (document.getElementById('topicList')) await loadTopics();
}

async function selectRoom(id, name) {
  currentRoomId = id;
  currentRoomName = name;
  lastMsgCount = 0;
  $('roomLabel').textContent = '# ' + name;
  // Get room's active topic
  const rooms = await fetchJson('/api/rooms');
  const room = rooms.find(r => r.id === id);
  currentTopicId = room?.active_topic_id || null;
  await loadTopics();
  await loadMessages();
  await loadAgents();
  await loadRooms();
}

async function createRoom() {
  const name = prompt('Room name:');
  if (!name) return;
  const r = await fetchJson('/api/rooms', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  await selectRoom(r.id || currentRoomId, name);
}

// ── TOPICS ────────────────────────────────────────────────────────────────────
async function loadTopics() {
  const topics = await fetchJson(`/api/topics?roomId=${currentRoomId}`);
  const tl = document.getElementById('topicList');
  if (!tl) return;
  tl.innerHTML = topics.map(t => `
    <div class="topic-item ${t.id === currentTopicId ? 'active' : ''}" onclick="selectTopic('${t.id}','${escHtml(t.name)}')">
      <span class="topic-dot"></span>${escHtml(t.name)}
    </div>
  `).join('');
  // Update badge
  const active = topics.find(t => t.id === currentTopicId);
  if (active) {
    currentTopicName = active.name;
    $('topicBadge').textContent = active.name;
  }
}

async function selectTopic(id, name) {
  currentTopicId = id;
  currentTopicName = name;
  $('topicBadge').textContent = name;
  lastMsgCount = 0;
  await fetchJson(`/api/rooms/${currentRoomId}/active-topic`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topicId: id })
  });
  await loadTopics();
  await loadMessages();
}

async function newTopic() {
  const name = prompt('Topic name:');
  if (!name) return;
  const r = await fetchJson('/api/topics', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ roomId: currentRoomId, name })
  });
  currentTopicId = r.id;
  currentTopicName = name;
  $('topicBadge').textContent = name;
  lastMsgCount = 0;
  await loadTopics();
  await loadMessages();
}

// ── MESSAGES ──────────────────────────────────────────────────────────────────
async function loadMessages() {
  if (!currentTopicId) return;
  const msgs = await fetchJson(`/api/messages?roomId=${currentRoomId}&topicId=${currentTopicId}`);
  const realMsgs = msgs.filter(m => m.role !== 'system');
  const suggests = msgs.filter(m => m.role === 'system' && m.content?.startsWith('TOPIC_SUGGEST:'));

  if (suggests.length && agentSuggest !== suggests[suggests.length - 1].content) {
    agentSuggest = suggests[suggests.length - 1].content;
    const suggested = agentSuggest.replace('TOPIC_SUGGEST:', '');
    if (currentTopicName === 'General') showSuggestBanner(suggested);
  }

  if (realMsgs.length === lastMsgCount) return;
  lastMsgCount = realMsgs.length;

  // Remove typing indicator
  const typing = document.getElementById('typingIndicator');
  if (typing) typing.remove();

  const container = $('messages');
  const emptyState = $('emptyState');

  if (realMsgs.length === 0) {
    container.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div class="empty-title">No messages yet</div><div class="empty-sub">Start the conversation or add an agent</div></div>';
    return;
  }
  if (emptyState) emptyState.remove();

  container.innerHTML = realMsgs.map(m => renderMessage(m)).join('');
  container.scrollTop = container.scrollHeight;
}

function renderMessage(m) {
  const initials = m.sender ? m.sender[0].toUpperCase() : '?';
  const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const content = renderMarkdown(m.content || '');

  let toolHtml = '';
  if (m.tool_activity && m.tool_activity.length > 0) {
    toolHtml = `<div class="tool-activity">${m.tool_activity.map(t =>
      `<span class="tool-chip ${t.status}" title="${escHtml(t.preview || '')}">${toolIcon(t.tool)} ${t.tool.replace(/_/g, ' ')}</span>`
    ).join('')}</div>`;
  }

  return `
    <div class="msg ${m.role}">
      <div class="msg-avatar">${initials}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-sender">${escHtml(m.sender)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble">${content}</div>
        ${toolHtml}
      </div>
    </div>`;
}

function toolIcon(name) {
  const icons = { read_file: '📄', write_file: '✏️', list_directory: '📁', search_files: '🔍', run_command: '⚡', fetch_url: '🌐', search_topics: '💬' };
  return icons[name] || '🔧';
}

function showTyping() {
  const existing = document.getElementById('typingIndicator');
  if (existing) return;
  const el = document.createElement('div');
  el.id = 'typingIndicator';
  el.className = 'typing-indicator';
  el.innerHTML = `<div class="msg-avatar" style="background:var(--green-dim);color:var(--green)">⬡</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  $('messages').appendChild(el);
  $('messages').scrollTop = $('messages').scrollHeight;
}

function showSuggestBanner(suggested) {
  const area = $('suggestArea');
  area.innerHTML = `
    <div class="suggest-banner">
      <span class="suggest-text">💡 Rename topic to "<strong>${escHtml(suggested)}</strong>"?</span>
      <div class="suggest-actions">
        <button class="btn btn-sm" onclick="acceptSuggest('${escHtml(suggested)}')">Accept</button>
        <button class="btn btn-ghost btn-sm" onclick="dismissSuggest()">Dismiss</button>
      </div>
    </div>`;
}

async function acceptSuggest(name) {
  await fetchJson(`/api/topics/${currentTopicId}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  currentTopicName = name;
  $('topicBadge').textContent = name;
  dismissSuggest();
  await loadTopics();
}

function dismissSuggest() {
  $('suggestArea').innerHTML = '';
  agentSuggest = 'dismissed';
}

// ── SEND ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = $('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  input.style.height = 'auto';

  // Optimistic render
  const emptyState = $('emptyState');
  if (emptyState) emptyState.remove();
  const fakeMsg = document.createElement('div');
  fakeMsg.innerHTML = renderMessage({ sender: currentUser, content, role: 'user', created_at: Date.now() });
  $('messages').appendChild(fakeMsg.firstChild);
  $('messages').scrollTop = $('messages').scrollHeight;

  showTyping();

  await fetchJson('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content, userName: currentUser, roomId: currentRoomId, topicId: currentTopicId })
  });

  lastMsgCount = 0; // Force reload
}

$('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

$('msgInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── AGENTS ────────────────────────────────────────────────────────────────────
async function loadAgents() {
  const agents = await fetchJson(`/api/agents?roomId=${currentRoomId}`);
  const list = $('agentList');
  if (agents.length === 0) {
    list.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:12px;text-align:center;line-height:1.6">No agents in this room.<br>Add one to get started.</div>`;
    return;
  }
  list.innerHTML = agents.map(a => `
    <div class="agent-card">
      <div class="agent-card-top">
        <div class="agent-name">${escHtml(a.name)}</div>
        <button class="agent-delete" onclick="deleteAgent('${a.id}')" title="Remove">×</button>
      </div>
      <div class="agent-model">${escHtml(a.model?.replace(':latest','') || '')}</div>
      ${a.tools_enabled ? `<div class="agent-tools-tag">🔧 Tools enabled</div>` : ''}
    </div>`).join('');
}

async function deleteAgent(id) {
  if (!confirm('Remove this agent?')) return;
  await fetchJson(`/api/agents/${id}`, { method: 'DELETE' });
  await loadAgents();
}

function showAgentModal() {
  const opts = models.length
    ? models.map(m => `<option value="${m.name}">${m.display_name}</option>`).join('')
    : '<option value="">No models found — click Refresh Models</option>';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Add Agent</div>
      <label>Name</label>
      <input id="aname" class="modal-input" placeholder="e.g. Research Bot" />
      <label>System Prompt</label>
      <textarea id="aprompt" class="modal-input" rows="4" placeholder="You are a helpful assistant..."></textarea>
      <label>Model</label>
      <select id="amodel" class="modal-input">${opts}</select>
      <div class="tools-toggle">
        <div class="toggle on" id="toolToggle" onclick="this.classList.toggle('on')"></div>
        Enable tools (file access, commands, web, topic search)
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="$('modal').remove()">Cancel</button>
        <button class="btn" onclick="saveAgent()">Add Agent</button>
      </div>
    </div>`;
  overlay.addEventListener('click', () => overlay.remove());
  document.body.appendChild(overlay);
  document.getElementById('aname').focus();
}

async function saveAgent() {
  const name = $('aname').value.trim();
  const prompt = $('aprompt').value.trim();
  const model = $('amodel').value;
  const tools = $('toolToggle').classList.contains('on');
  if (!name || !model) return;

  await fetchJson('/api/agents', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, system_prompt: prompt, model, roomId: currentRoomId, tools_enabled: tools })
  });
  $('modal').remove();
  await loadAgents();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(text) {
  // Basic markdown: code blocks, inline code, bold, italic, lists
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm, '<strong>$1</strong>')
    .replace(/^# (.+)$/gm, '<strong>$1</strong>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(?!<)(.+)$/gm, (m) => m.startsWith('<') ? m : `<p>${m}</p>`)
    .replace(/<p><\/p>/g, '');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999;animation:slideUp 0.2s ease';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
</script>
