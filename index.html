<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ... (All your CSS remains the same as your previous snippet) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090b10; --surface: #0f1219; --panel: #141820; --border: #1e2535;
      --text: #c8d0e0; --muted: #4a5568; --accent: #3d8ef8; --user-bg: #141e30;
      --agent-bg: #0d1a14; --tool-bg: #12181a; --error: #ff4757; --warn: #ffd93d;
      --radius: 8px; --font-mono: 'JetBrains Mono', monospace; --font-ui: 'Syne', sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; display: flex; flex-direction: column; }
    #nameGate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .gate-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 340px; text-align: center; }
    .gate-box h1 { font-family: var(--font-ui); font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .gate-box input { width: 100%; padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); margin-bottom: 10px; text-align: center; outline: none; }
    .btn { display: inline-block; padding: 10px 28px; background: var(--accent); color: #fff; font-family: var(--font-ui); font-weight: 600; border: none; border-radius: var(--radius); cursor: pointer; width: 100%; }
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .room-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .room-item.active { background: var(--panel); color: #fff; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
    #inputArea { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; }
    #msgInput { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px; resize: none; }
    #agentPanel { width: 290px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 460px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .field input, .field textarea, .field select { width: 100%; padding: 9px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); }
  </style>
</head>
<body>

<div id="nameGate">
  <div class="gate-box">
    <h1>Agent Hub</h1>
    <p>Local AI · Shared rooms · Real-time</p>
    <input id="nameInput" type="text" placeholder="Your name..." maxlength="24" />
    <div class="color-row" id="userColorPicker"></div>
    <button class="btn" onclick="enterHub()">Enter Hub</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>⬡ Agent Hub</h2>
      <div class="sub" id="sidebarUserLabel"></div>
      <div class="sub" id="buildInfo">build: …</div>
    </div>
    <div class="section-label">Rooms</div>
    <div id="roomList"></div>
    <div class="sidebar-add" onclick="showNewRoomModal()">+ New Room</div>
  </div>

  <div id="main">
    <div id="chatHeader">
      <div class="room-name" id="roomLabel">Main Room</div>
      <div id="chatMeta">
        <div class="presence" id="onlineUsers">online: —</div>
        <div class="status" id="connStatus">connected</div>
      </div>
    </div>
    <div id="messages"></div>
    <div id="inputArea">
      <textarea id="msgInput" rows="1" placeholder="Message..."></textarea>
      <button id="sendBtn" class="btn" style="width:auto" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div id="agentPanel">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="setPanelTab('agents')">Agents</div>
      <div class="panel-tab" onclick="setPanelTab('models')">Models</div>
    </div>
    <div class="panel-section active" id="sectionAgents">
      <div class="panel-header">
        <h3>Agents</h3>
        <button class="btn sm" style="width:auto" onclick="showAgentModal(null)">+ New</button>
      </div>
      <div id="agentList"></div>
    </div>
    <div class="panel-section" id="sectionModels">
      <div id="modelsList"></div>
    </div>
  </div>
</div>

<script>
let userName = '';
let userColor = '#3d8ef8';
let currentRoomId = 'main'; // Default to main so 'Add Agent' works immediately
let models = [];

const USER_COLORS = ['#3d8ef8','#00ff88','#ff6b6b','#ffd93d','#c77dff','#ff9f43'];

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function enterHub() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  userName = val;
  document.getElementById('nameGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebarUserLabel').textContent = userName;
  loadRooms();
  loadModels();
}

async function loadRooms() {
  const rooms = await fetchJson('/api/rooms');
  const list = document.getElementById('roomList');
  list.innerHTML = rooms.map(r => `
    <div class="room-item ${r.id === currentRoomId ? 'active' : ''}" onclick="selectRoom('${r.id}')">
      ${r.name}
    </div>
  `).join('');
  loadAgents();
}

async function selectRoom(id) {
  currentRoomId = id;
  loadRooms();
  loadAgents();
}

async function loadModels() {
  models = await fetchJson('/api/models');
  const list = document.getElementById('modelsList');
  list.innerHTML = models.map(m => `<div class="model-card">${m.display_name}</div>`).join('');
}

async function loadAgents() {
  if (!currentRoomId) return;
  const agents = await fetchJson(`/api/agents?roomId=${currentRoomId}`);
  const list = document.getElementById('agentList');
  list.innerHTML = agents.map(a => `
    <div class="agent-card">
      <div class="agent-card-name">${a.name}</div>
      <div class="agent-card-model">${a.model}</div>
      <button class="edit-btn" onclick='showAgentModal(${JSON.stringify(a)})'>Edit</button>
    </div>
  `).join('');
}

function showAgentModal(agent) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'agentModal';
  
  const modelOptions = models.map(m => 
    `<option value="${m.name}" ${agent?.model === m.name ? 'selected' : ''}>${m.display_name}</option>`
  ).join('');

  overlay.innerHTML = `
    <div class="modal">
      <h3>${agent ? 'Edit Agent' : 'New Agent'}</h3>
      <div class="field">
        <label>Name</label>
        <input id="ma_name" type="text" value="${agent ? agent.name : ''}" />
      </div>
      <div class="field">
        <label>System Prompt</label>
        <textarea id="ma_prompt">${agent ? agent.system_prompt : ''}</textarea>
      </div>
      <div class="field">
        <label>Model</label>
        <select id="ma_model">${modelOptions}</select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="saveAgent('${agent ? agent.id : ''}')">Save</button>
        <button class="btn" style="background:#444" onclick="document.getElementById('agentModal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function saveAgent(id) {
  const name = document.getElementById('ma_name').value;
  const system_prompt = document.getElementById('ma_prompt').value;
  const model = document.getElementById('ma_model').value;
  const roomId = currentRoomId || 'main';

  const method = id ? 'PUT' : 'POST';
  const url = id ? `/api/agents/${id}` : '/api/agents';

  await fetchJson(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, system_prompt, model, roomId, active: true })
  });
  
  document.getElementById('agentModal').remove();
  loadAgents();
}

function setPanelTab(tab) {
  document.getElementById('sectionAgents').classList.toggle('active', tab === 'agents');
  document.getElementById('sectionModels').classList.toggle('active', tab === 'models');
}

// Simple color picker init
const cp = document.getElementById('userColorPicker');
USER_COLORS.forEach(c => {
  const s = document.createElement('div');
  s.style.width='20px'; s.style.height='20px'; s.style.background=c; s.style.cursor='pointer';
  s.onclick = () => userColor = c;
  cp.appendChild(s);
});
</script>
</body>
</html>
