<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>Agent Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #090b10; --surface: #0f1219; --panel: #141820; --border: #1e2535; --text: #c8d0e0; --accent: #3d8ef8; --radius: 8px; }
    body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; display: flex; height: 100vh; margin: 0; }
    #sidebar { width: 220px; border-right: 1px solid var(--border); background: var(--surface); padding: 20px; }
    #main { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px; border-radius: 8px; max-width: 80%; background: var(--panel); }
    .msg.user { align-self: flex-end; background: #1e2535; }
    #inputArea { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    #msgInput { flex: 1; background: var(--panel); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; }
    #agentPanel { width: 280px; border-left: 1px solid var(--border); background: var(--surface); padding: 20px; }
    .btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); padding: 30px; border-radius: 12px; width: 400px; border: 1px solid var(--border); }
    .field { margin-bottom: 15px; }
    .field input, .field textarea, .field select { width: 100%; background: var(--panel); border: 1px solid var(--border); color: white; padding: 8px; margin-top: 5px; }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>Rooms</h3>
  <div id="roomList"></div>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="inputArea">
    <textarea id="msgInput" placeholder="Message..."></textarea>
    <button class="btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="agentPanel">
  <div style="display:flex; justify-content:space-between">
    <h3>Agents</h3>
    <button class="btn" onclick="showAgentModal()">+ New</button>
  </div>
  <div id="agentList"></div>
</div>

<script>
let currentRoomId = 'main';
let models = [];

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  return res.json();
}

async function init() {
  models = await fetchJson('/api/models');
  const rooms = await fetchJson('/api/rooms');
  document.getElementById('roomList').innerHTML = rooms.map(r => `<div onclick="currentRoomId='${r.id}'">${r.name}</div>`).join('');
  loadAgents();
}

async function loadAgents() {
  const agents = await fetchJson('/api/agents');
  document.getElementById('agentList').innerHTML = agents.map(a => `
    <div style="margin-top:10px; padding:10px; border:1px solid #333">
      <strong>${a.name}</strong><br><small>${a.model}</small>
    </div>
  `).join('');
}

function showAgentModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal';
  const options = models.map(m => `<option value="${m.name}">${m.display_name}</option>`).join('');
  overlay.innerHTML = `
    <div class="modal">
      <div class="field"><label>Name</label><input id="na_name"></div>
      <div class="field"><label>System Prompt</label><textarea id="na_prompt"></textarea></div>
      <div class="field"><label>Model</label><select id="na_model">${options}</select></div>
      <button class="btn" onclick="saveAgent()">Save Agent</button>
      <button onclick="document.getElementById('modal').remove()">Cancel</button>
    </div>`;
  document.body.appendChild(overlay);
}

async function saveAgent() {
  const name = document.getElementById('na_name').value;
  const system_prompt = document.getElementById('na_prompt').value;
  const model = document.getElementById('na_model').value;
  await fetchJson('/api/agents', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, system_prompt, model, roomId: currentRoomId })
  });
  document.getElementById('modal').remove();
  loadAgents();
}

async function sendMessage() {
  const content = document.getElementById('msgInput').value;
  const agents = await fetchJson('/api/agents');
  if(!agents.length) return alert("Create an agent first!");
  
  addMessage('user', content, 'You');
  document.getElementById('msgInput').value = '';

  const res = await fetchJson('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content, agentId: agents[0].id })
  });
  addMessage('assistant', res.content, res.sender);
}

function addMessage(role, text, sender) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<strong>${sender}</strong><br>${text}`;
  document.getElementById('messages').appendChild(div);
}

init();
</script>
</body>
</html>
