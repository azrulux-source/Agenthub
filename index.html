<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090b10; --surface: #0f1219; --panel: #141820; --border: #1e2535;
      --text: #c8d0e0; --muted: #4a5568; --accent: #3d8ef8; --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'JetBrains Mono', monospace; 
      display: flex; height: 100vh; overflow: hidden; 
    }

    /* Sidebar */
    #sidebar { 
      width: 240px; border-right: 1px solid var(--border); 
      background: var(--surface); display: flex; flex-direction: column; 
    }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    #roomList { flex: 1; overflow-y: auto; padding: 10px; }
    .room-item { 
      padding: 12px; cursor: pointer; border-radius: 6px; 
      margin-bottom: 4px; transition: 0.2s; font-size: 13px;
    }
    .room-item:hover { background: var(--panel); }
    .room-item.active { background: var(--accent); color: white; }

    /* Main Chat Area */
    #main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
    #chatHeader { padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    
    .msg { padding: 12px; border-radius: var(--radius); max-width: 80%; line-height: 1.5; }
    .msg.user { align-self: flex-end; background: var(--user-bg, #1e2535); border: 1px solid var(--border); }
    .msg.assistant { align-self: flex-start; background: #0d1a14; border: 1px solid #1b3328; }
    .msg-sender { font-size: 10px; font-weight: bold; margin-bottom: 4px; color: var(--accent); text-transform: uppercase; }

    #inputArea { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surface); }
    #msgInput { 
      flex: 1; background: var(--panel); border: 1px solid var(--border); 
      color: white; padding: 12px; border-radius: var(--radius); resize: none; outline: none;
    }

    /* Agent Panel */
    #agentPanel { width: 280px; border-left: 1px solid var(--border); background: var(--surface); padding: 20px; }
    .agent-card { 
      background: var(--panel); border: 1px solid var(--border); 
      padding: 12px; border-radius: 8px; margin-bottom: 10px; 
    }

    /* Utility */
    .btn { 
      background: var(--accent); color: white; border: none; padding: 10px 15px; 
      border-radius: 6px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600;
    }
    .btn.secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }

    /* Modals */
    .modal-overlay { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal { 
      background: var(--surface); padding: 30px; border-radius: 12px; 
      width: 450px; border: 1px solid var(--border); 
    }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
    .field input, .field textarea, .field select { 
      width: 100%; background: var(--panel); border: 1px solid var(--border); 
      color: white; padding: 10px; border-radius: 6px; outline: none;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <h2 style="font-family: 'Syne';">⬡ Hub</h2>
  </div>
  <div id="roomList"></div>
  <div style="padding: 10px;">
    <button class="btn secondary" style="width: 100%;" onclick="createRoom()">+ New Room</button>
  </div>
</div>

<div id="main">
  <div id="chatHeader">
    <h3 id="currentRoomName">Main Room</h3>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
    <button class="btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="agentPanel">
  <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
    <h3 style="font-family: 'Syne';">Agents</h3>
    <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="showAgentModal()">+ Add</button>
  </div>
  <div id="agentList"></div>
</div>

<script>
let currentRoomId = 'main';
let models = [];

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function init() {
  await loadRooms();
  // Fetch models to populate dropdowns later
  try {
    models = await fetchJson('/api/models');
  } catch (e) {
    console.error("Could not load models from server.");
  }
  loadAgents();
}

async function loadRooms() {
  const rooms = await fetchJson('/api/rooms');
  const list = document.getElementById('roomList');
  list.innerHTML = rooms.map(r => `
    <div class="room-item ${r.id === currentRoomId ? 'active' : ''}" onclick="selectRoom('${r.id}', '${r.name}')">
      # ${r.name}
    </div>
  `).join('');
}

async function selectRoom(id, name) {
  currentRoomId = id;
  document.getElementById('currentRoomName').textContent = name;
  document.getElementById('messages').innerHTML = ''; 
  await loadRooms();
  await loadAgents();
}

async function createRoom() {
  const name = prompt("Room Name:");
  if (!name) return;
  await fetchJson('/api/rooms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  loadRooms();
}

async function loadAgents() {
  const agents = await fetchJson(`/api/agents?roomId=${currentRoomId}`);
  const list = document.getElementById('agentList');
  list.innerHTML = agents.map(a => `
    <div class="agent-card">
      <div style="font-weight: bold; font-size: 14px;">${a.name}</div>
      <div style="font-size: 11px; color: var(--muted);">${a.model}</div>
    </div>
  `).join('');
}

function showAgentModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'agentModal';
  
  const options = models.length > 0 
    ? models.map(m => `<option value="${m.name}">${m.display_name}</option>`).join('')
    : `<option disabled>No models found in Ollama</option>`;

  overlay.innerHTML = `
    <div class="modal">
      <h3 style="margin-bottom: 20px; font-family: 'Syne';">Create Agent</h3>
      <div class="field"><label>Name</label><input id="ma_name" placeholder="Agent name..."></div>
      <div class="field"><label>System Prompt</label><textarea id="ma_prompt" rows="4" placeholder="How should it behave?"></textarea></div>
      <div class="field"><label>Ollama Model</label><select id="ma_model">${options}</select></div>
      <div style="display:flex; gap: 10px; margin-top: 20px;">
        <button class="btn" style="flex:1" onclick="saveAgent()">Save</button>
        <button class="btn secondary" style="flex:1" onclick="document.getElementById('agentModal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function saveAgent() {
  const name = document.getElementById('ma_name').value;
  const system_prompt = document.getElementById('ma_prompt').value;
  const model = document.getElementById('ma_model').value;

  if (!name || !model) return alert("Missing name or model");

  await fetchJson('/api/agents', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, system_prompt, model, roomId: currentRoomId })
  });
  
  document.getElementById('agentModal').remove();
  loadAgents();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;

  const agents = await fetchJson(`/api/agents?roomId=${currentRoomId}`);
  if (agents.length === 0) return alert("Please add an agent to this room first.");

  addMessage('user', content, 'You');
  input.value = '';

  try {
    // For now, the first agent in the room responds
    const res = await fetchJson('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, agentId: agents[0].id })
    });
    addMessage('assistant', res.content, res.sender);
  } catch (e) {
    addMessage('assistant', "Error: Check if Ollama is running.", "System");
  }
}

function addMessage(role, text, sender) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-sender">${sender}</div><div class="msg-content">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Handle Enter to send
document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

init();
</script>
</body>
</html>
